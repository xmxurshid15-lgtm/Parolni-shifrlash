<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Parol Shifrlash - Maxfiy Kirish</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c10;
            --surface: #0d1117;
            --panel: #111820;
            --border: #1e2d3d;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --accent3: #10b981;
            --warn: #f59e0b;
            --text: #e2eaf4;
            --text-muted: #6b8299;
            --mono: 'Space Mono', monospace;
            --sans: 'Syne', sans-serif;
            --glow: 0 0 20px rgba(0,212,255,0.25);
            --glow-sm: 0 0 10px rgba(0,212,255,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Background Anim */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridShift 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes gridShift {
            0% { transform: translate(0,0); }
            100% { transform: translate(40px,40px); }
        }

        .orb2 {
            position: fixed;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
            bottom: -80px; left: -80px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        /* Login Overlay */
        #loginOverlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* Main Content Wrapper */
        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
            display: none; /* Initially hidden */
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .header { text-align: center; margin-bottom: 32px; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,212,255,0.08);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 100px;
            padding: 4px 14px;
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        h1 {
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            font-weight: 800;
            line-height: 1.1;
            background: linear-gradient(135deg, #ffffff 0%, var(--accent) 60%, var(--accent2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            position: relative;
            overflow: hidden;
        }

        .warning {
            display: flex; align-items: flex-start; gap: 10px;
            background: rgba(245,158,11,0.06);
            border: 1px solid rgba(245,158,11,0.2);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 24px;
            font-family: var(--mono);
            font-size: 0.72rem;
            color: var(--warn);
        }

        label {
            display: block; font-family: var(--mono); font-size: 0.7rem;
            text-transform: uppercase; letter-spacing: 2px;
            color: var(--text-muted); margin-bottom: 8px;
        }

        .input-wrap { position: relative; margin-bottom: 20px; }

        input {
            width: 100%; background: var(--panel); border: 1px solid var(--border);
            border-radius: 12px; padding: 13px 16px; font-family: var(--mono);
            font-size: 0.9rem; color: var(--text); outline: none;
            transition: all 0.2s;
        }

        input:focus { border-color: var(--accent); box-shadow: var(--glow-sm); }

        .method-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }

        .method-btn {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 12px; padding: 14px 10px; cursor: pointer;
            text-align: center; transition: all 0.2s;
        }

        .method-btn.active { border-color: var(--accent); background: rgba(0,212,255,0.06); }

        .encrypt-btn {
            width: 100%; background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            border: none; border-radius: 12px; padding: 15px; font-weight: 700;
            color: white; cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
        }

        .encrypt-btn:hover { box-shadow: 0 0 30px rgba(0,212,255,0.3); opacity: 0.9; }

        .result-box {
            display: none; margin-top: 20px; background: var(--panel);
            border: 1px solid var(--border); border-radius: 16px; overflow: hidden;
        }

        .result-header {
            display: flex; justify-content: space-between; padding: 12px 16px;
            background: rgba(0,212,255,0.03); border-bottom: 1px solid var(--border);
        }

        .result-value { font-family: var(--mono); font-size: 0.78rem; padding: 16px; word-break: break-all; color: #a8c8e8; }

        .legend { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 20px; }

        .legend-item { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 12px; }

        @media (max-width: 480px) {
            .method-grid, .legend { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="orb2"></div>

<div id="loginOverlay">
    <div class="card" style="width: 100%; max-width: 350px; text-align: center;">
        <div class="badge">Xavfsiz Tizim</div>
        <h2 style="margin-bottom: 20px; font-family: var(--sans);">Kirish</h2>
        <div class="input-wrap">
            <input type="text" id="username" placeholder="Login">
        </div>
        <div class="input-wrap">
            <input type="password" id="sysPassword" placeholder="Parol">
        </div>
        <button class="encrypt-btn" id="loginBtn">KIRISH</button>
        <p id="loginError" style="color: #ef4444; font-family: var(--mono); font-size: 0.7rem; margin-top: 10px; display: none;">Xato kiritildi!</p>
    </div>
</div>

<div class="wrapper" id="mainContent">
    <div class="header">
        <div class="badge">Onlayn vosita</div>
        <h1>Parol Shifrlash</h1>
        <div style="font-family: var(--mono); font-size: 0.8rem; color: var(--text-muted); margin-top: 10px;">// Mahalliy shifrlash</div>
    </div>

    <div class="card">
        <div class="warning">
            <span>⚡ Barcha amallar brauzerda bajariladi. Ma'lumotlar serverga yuborilmaydi.</span>
        </div>

        <label>Matn yoki Parol</label>
        <div class="input-wrap">
            <input type="text" id="passwordInput" placeholder="Matnni kiriting..." autocomplete="off">
        </div>

        <label>Usulni tanlang</label>
        <div class="method-grid">
            <div class="method-btn active" data-method="sha256">
                <span style="display:block; font-size: 1.2rem;">🔒</span>
                <b style="font-size: 0.7rem;">SHA-256</b>
            </div>
            <div class="method-btn" data-method="base64">
                <span style="display:block; font-size: 1.2rem;">📦</span>
                <b style="font-size: 0.7rem;">Base64</b>
            </div>
            <div class="method-btn" data-method="aes">
                <span style="display:block; font-size: 1.2rem;">🛡️</span>
                <b style="font-size: 0.7rem;">AES-GCM</b>
            </div>
        </div>

        <div id="aesKeyWrap" style="display: none;">
            <label>AES Kaliti (min. 6 belgi)</label>
            <div class="input-wrap">
                <input type="password" id="aesKeyInput" placeholder="Maxfiy kalit">
            </div>
        </div>

        <button class="encrypt-btn" id="encryptBtn">SHIFRLA</button>

        <div class="result-box" id="resultBox">
            <div class="result-header">
                <span style="font-size: 0.6rem; color: var(--accent);">▶ NATIJA</span>
                <span id="resultMethodTag" style="font-size: 0.6rem; background: rgba(16,185,129,0.1); padding: 2px 8px; border-radius: 10px; color: var(--accent3);"></span>
            </div>
            <div class="result-value" id="resultText"></div>
            <div style="padding: 10px 16px; border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                <span id="charCount" style="font-size: 0.6rem; color: var(--text-muted);"></span>
                <button id="copyBtn" style="background: rgba(0,212,255,0.1); border: 1px solid var(--accent); color: var(--accent); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 0.7rem;">Nusxalash</button>
            </div>
        </div>
    </div>

    <div class="legend">
        <div class="legend-item"><div style="color: var(--accent); font-size: 0.7rem; font-weight: bold;">SHA-256</div><div style="font-size: 0.6rem; color: var(--text-muted);">Qaytarib bo'lmaydi.</div></div>
        <div class="legend-item"><div style="color: var(--accent2); font-size: 0.7rem; font-weight: bold;">Base64</div><div style="font-size: 0.6rem; color: var(--text-muted);">Oddiy kodlash.</div></div>
        <div class="legend-item"><div style="color: var(--accent3); font-size: 0.7rem; font-weight: bold;">AES</div><div style="font-size: 0.6rem; color: var(--text-muted);">Kalitli shifrlash.</div></div>
    </div>
</div>

<script>
(function() {
    // --- LOGIN SOZLAMALARI ---
    const ADMIN_USER = "admin";
    const ADMIN_PASS = "12345";

    const loginOverlay = document.getElementById('loginOverlay');
    const mainContent = document.getElementById('mainContent');
    const loginBtn = document.getElementById('loginBtn');
    
    loginBtn.addEventListener('click', () => {
        const u = document.getElementById('username').value;
        const p = document.getElementById('sysPassword').value;

        if(u === ADMIN_USER && p === ADMIN_PASS) {
            loginOverlay.style.opacity = "0";
            loginOverlay.style.transition = "0.5s";
            setTimeout(() => {
                loginOverlay.style.display = "none";
                mainContent.style.display = "block";
                mainContent.style.animation = "fadeUp 0.6s ease both";
            }, 500);
        } else {
            document.getElementById('loginError').style.display = "block";
            loginBtn.style.animation = "shake 0.3s ease";
            setTimeout(() => loginBtn.style.animation = "", 300);
        }
    });

    // --- SHIFRLASH MANTIQI ---
    const passwordInput = document.getElementById('passwordInput');
    const aesKeyInput = document.getElementById('aesKeyInput');
    const aesKeyWrap = document.getElementById('aesKeyWrap');
    const encryptBtn = document.getElementById('encryptBtn');
    const resultBox = document.getElementById('resultBox');
    const resultText = document.getElementById('resultText');
    const methodBtns = document.querySelectorAll('.method-btn');
    let currentMethod = 'sha256';

    methodBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            methodBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMethod = btn.dataset.method;
            aesKeyWrap.style.display = currentMethod === 'aes' ? 'block' : 'none';
        });
    });

    async function sha256(msg) {
        const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
        return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    async function encryptAES(text, keyStr) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(keyStr), {name: 'PBKDF2'}, false, ['deriveKey']);
        const salt = crypto.getRandomValues(new Uint8Array(16));
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const key = await crypto.subtle.deriveKey(
            {name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256'},
            keyMaterial, {name: 'AES-GCM', length: 256}, false, ['encrypt']
        );
        const encrypted = await crypto.subtle.encrypt({name: 'AES-GCM', iv}, key, enc.encode(text));
        const combined = new Uint8Array(salt.length + iv.length + encrypted.byteLength);
        combined.set(salt, 0); combined.set(iv, salt.length); combined.set(new Uint8Array(encrypted), salt.length + iv.length);
        return btoa(String.fromCharCode(...combined));
    }

    encryptBtn.addEventListener('click', async () => {
        const val = passwordInput.value.trim();
        if(!val) return;
        
        encryptBtn.textContent = "ISHLANMOQDA...";
        try {
            let res = "";
            if(currentMethod === 'sha256') res = await sha256(val);
            else if(currentMethod === 'base64') res = btoa(unescape(encodeURIComponent(val)));
            else if(currentMethod === 'aes') res = await encryptAES(val, aesKeyInput.value);

            resultText.textContent = res;
            document.getElementById('resultMethodTag').textContent = currentMethod.toUpperCase();
            document.getElementById('charCount').textContent = res.length + " belgi";
            resultBox.style.display = "block";
        } catch(e) { alert("Xato!"); }
        encryptBtn.textContent = "SHIFRLA";
    });

    document.getElementById('copyBtn').addEventListener('click', () => {
        navigator.clipboard.writeText(resultText.textContent);
        const btn = document.getElementById('copyBtn');
        btn.textContent = "Nusxalandi!";
        setTimeout(() => btn.textContent = "Nusxalash", 2000);
    });
})();
</script>
</body>
</html>
