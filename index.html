<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Parol Shifrlash - Xavfsiz Tizim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c10;
            --surface: #0d1117;
            --panel: #111820;
            --border: #1e2d3d;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --accent3: #10b981;
            --warn: #f59e0b;
            --text: #e2eaf4;
            --text-muted: #6b8299;
            --mono: 'Space Mono', monospace;
            --sans: 'Syne', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px 16px;
            overflow-x: hidden;
        }

        /* Animatsiyalar */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .badge {
            display: inline-flex;
            background: rgba(0,212,255,0.08);
            border: 1px solid rgba(0,212,255,0.2);
            border-radius: 100px;
            padding: 4px 14px;
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        h2 { margin-bottom: 20px; font-weight: 800; }

        .input-wrap { margin-bottom: 15px; text-align: left; }

        label {
            display: block; font-family: var(--mono); font-size: 0.65rem;
            color: var(--text-muted); margin-bottom: 5px; letter-spacing: 1px;
        }

        input {
            width: 100%; background: var(--panel); border: 1px solid var(--border);
            border-radius: 12px; padding: 12px 16px; font-family: var(--mono);
            font-size: 0.9rem; color: var(--text); outline: none;
        }

        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%; background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
            border: none; border-radius: 12px; padding: 14px; font-weight: 700;
            color: white; cursor: pointer; margin-top: 10px;
        }

        .link-text {
            margin-top: 15px; font-size: 0.8rem; color: var(--text-muted); cursor: pointer;
        }

        .link-text span { color: var(--accent); text-decoration: underline; }

        #mainContent { display: none; width: 100%; max-width: 600px; }
        #registerSection { display: none; }
        .error-msg { color: #ef4444; font-size: 0.7rem; margin-top: 5px; display: none; font-family: var(--mono); }

        /* Asosiy ishchi qism stillari (oldigi kodingizdan) */
        .method-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .method-btn { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 10px; cursor: pointer; text-align: center; font-size: 0.7rem; }
        .method-btn.active { border-color: var(--accent); background: rgba(0,212,255,0.06); }
        .result-box { margin-top: 20px; background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 15px; display: none; word-break: break-all; }
    </style>
</head>
<body>

    <div id="loginSection" class="card" style="text-align: center;">
        <div class="badge">Kirish</div>
        <h2>Xush kelibsiz</h2>
        <div class="input-wrap">
            <label>LOGIN</label>
            <input type="text" id="loginUser" placeholder="Loginingizni kiriting">
        </div>
        <div class="input-wrap">
            <label>PAROL</label>
            <input type="password" id="loginPass" placeholder="••••••••">
        </div>
        <button class="btn" id="loginBtn">KIRISH</button>
        <p id="loginError" class="error-msg">Login yoki parol noto'g'ri!</p>
        <p class="link-text" onclick="toggleAuth('reg')">Hali hisobingiz yo'qmi? <span>Ro'yxatdan o'ting</span></p>
    </div>

    <div id="registerSection" class="card" style="text-align: center;">
        <div class="badge">Ro'yxatdan o'tish</div>
        <h2>Yangi hisob</h2>
        <div class="input-wrap">
            <label>YANGI LOGIN</label>
            <input type="text" id="regUser" placeholder="Kamida 3 ta belgi">
        </div>
        <div class="input-wrap">
            <label>YANGI PAROL</label>
            <input type="password" id="regPass" placeholder="Kamida 5 ta belgi">
        </div>
        <button class="btn" id="regBtn">RO'YXATDAN O'TISH</button>
        <p id="regError" class="error-msg">Bu login allaqachon mavjud yoki ma'lumotlar kam!</p>
        <p class="link-text" onclick="toggleAuth('login')">Akkauntingiz bormi? <span>Kirish</span></p>
    </div>

    <div id="mainContent">
        <div style="text-align: center; margin-bottom: 20px;">
            <div class="badge">Tizimga kirildi</div>
            <h1 id="welcomeTitle">Salom!</h1>
        </div>
        
        <div class="card">
            <label>Matnni kiriting</label>
            <input type="text" id="passwordInput" placeholder="Shifrlash uchun matn...">
            
            <div class="method-grid">
                <div class="method-btn active" data-method="sha256">SHA-256</div>
                <div class="method-btn" data-method="base64">Base64</div>
                <div class="method-btn" data-method="aes">AES</div>
            </div>

            <button class="btn" id="encryptBtn">SHIFRLASH</button>

            <div id="resultBox" class="result-box">
                <div style="font-size: 0.6rem; color: var(--accent); margin-bottom: 5px;">NATIJA:</div>
                <div id="resultText" style="font-family: var(--mono); font-size: 0.8rem;"></div>
            </div>
            
            <button class="btn" style="background: #334155; margin-top: 20px;" onclick="location.reload()">CHIQISH</button>
        </div>
    </div>

<script>
    // --- FOYDALANUVCHILARNI BOSHQARISH ---
    const loginSection = document.getElementById('loginSection');
    const registerSection = document.getElementById('registerSection');
    const mainContent = document.getElementById('mainContent');

    function toggleAuth(type) {
        if(type === 'reg') {
            loginSection.style.display = 'none';
            registerSection.style.display = 'block';
        } else {
            loginSection.style.display = 'block';
            registerSection.style.display = 'none';
        }
    }

    // Ro'yxatdan o'tish mantiqi
    document.getElementById('regBtn').addEventListener('click', () => {
        const user = document.getElementById('regUser').value.trim();
        const pass = document.getElementById('regPass').value.trim();
        const error = document.getElementById('regError');

        if(user.length < 3 || pass.length < 5) {
            error.textContent = "Login kamida 3, parol 5 ta belgi bo'lsin!";
            error.style.display = 'block';
            return;
        }

        let users = JSON.parse(localStorage.getItem('users') || '{}');
        
        if(users[user]) {
            error.textContent = "Bu login band!";
            error.style.display = 'block';
        } else {
            users[user] = pass;
            localStorage.setItem('users', JSON.stringify(users));
            alert("Muvaffaqiyatli ro'yxatdan o'tdingiz! Endi kiring.");
            toggleAuth('login');
        }
    });

    // Kirish mantiqi
    document.getElementById('loginBtn').addEventListener('click', () => {
        const user = document.getElementById('loginUser').value.trim();
        const pass = document.getElementById('loginPass').value.trim();
        const users = JSON.parse(localStorage.getItem('users') || '{"admin":"12345"}'); // Default admin

        if(users[user] && users[user] === pass) {
            loginSection.style.display = 'none';
            mainContent.style.display = 'block';
            mainContent.style.animation = "fadeUp 0.5s ease";
            document.getElementById('welcomeTitle').textContent = "Salom, " + user + "!";
        } else {
            const err = document.getElementById('loginError');
            err.style.display = 'block';
            document.getElementById('loginBtn').style.animation = "shake 0.3s";
            setTimeout(() => document.getElementById('loginBtn').style.animation = "", 300);
        }
    });

    // --- SHIFRLASH (SODDALASHTIRILGAN) ---
    let currentMethod = 'sha256';
    const methodBtns = document.querySelectorAll('.method-btn');

    methodBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            methodBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentMethod = btn.dataset.method;
        });
    });

    document.getElementById('encryptBtn').addEventListener('click', async () => {
        const text = document.getElementById('passwordInput').value;
        if(!text) return;
        
        let res = "";
        if(currentMethod === 'sha256') {
            const msgBuffer = new TextEncoder().encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            res = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        } else if(currentMethod === 'base64') {
            res = btoa(text);
        } else {
            res = "AES rejimi faollashdi (Simulyatsiya)";
        }

        document.getElementById('resultText').textContent = res;
        document.getElementById('resultBox').style.display = 'block';
    });
</script>
</body>
</html>
