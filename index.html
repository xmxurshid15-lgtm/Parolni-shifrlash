<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LockForge - Kripto Tarix va Deshifrlash</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root {
            --bg: #05070a;
            --surface: #0b0f15;
            --panel: #121820;
            --border: #1e2d3d;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --accent3: #10b981;
            --text: #e2eaf4;
            --text-muted: #8b9eb3;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }

        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .main-card { max-width: 1200px; display: none; animation: fadeIn 0.6s ease; }
        .auth-card { max-width: 450px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        h2 { font-size: 2rem; margin-bottom: 25px; font-weight: 800; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .method-tabs { display: flex; gap: 10px; margin-bottom: 30px; background: var(--panel); padding: 6px; border-radius: 18px; }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-radius: 14px; font-size: 0.85rem; color: var(--text-muted); transition: 0.3s; }
        .tab.active { background: var(--accent); color: #000; font-weight: bold; }

        .grid-layout { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        @media (max-width: 1000px) { .grid-layout { grid-template-columns: 1fr; } }

        .input-group { margin-bottom: 20px; }
        label { display: block; font-family: 'Space Mono', monospace; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; }

        input, textarea {
            width: 100%; background: var(--panel); border: 1px solid var(--border);
            border-radius: 14px; padding: 12px; font-family: 'Space Mono', monospace;
            color: var(--text); outline: none; transition: 0.2s; font-size: 0.85rem;
        }
        textarea { height: 120px; resize: none; }

        .btn {
            width: 100%; border: none; border-radius: 14px; padding: 14px; font-weight: 700;
            color: white; cursor: pointer; font-size: 0.9rem; transition: 0.3s; margin-bottom: 10px;
        }
        .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
        .btn-decrypt { background: var(--accent3); color: #000; }
        
        /* Tarix oynasi stili */
        .history-panel {
            background: #000; border: 1px solid var(--border); border-radius: 14px;
            padding: 15px; height: 450px; overflow-y: auto;
        }
        .history-item {
            background: var(--panel); padding: 10px; border-radius: 8px; margin-bottom: 10px;
            font-size: 0.75rem; border-left: 3px solid var(--accent2);
        }
        .history-item span { color: var(--accent); display: block; margin-top: 5px; word-break: break-all; }

        .result-screen { background: #000; border: 1px solid var(--accent); border-radius: 14px; padding: 15px; min-height: 150px; color: var(--accent); font-family: 'Space Mono', monospace; word-break: break-all; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="authContainer" class="card auth-card">
        <div id="loginView">
            <h2>Kirish</h2>
            <input type="text" id="lUser" placeholder="Login" class="input-group">
            <input type="password" id="lPass" placeholder="Parol" class="input-group" style="width:100%; margin-bottom:20px;">
            <button class="btn btn-primary" onclick="handleLogin()">KIRISH</button>
            <p onclick="toggleAuth('reg')" style="cursor:pointer; font-size:0.8rem; margin-top:10px;">Ro'yxatdan o'tish</p>
        </div>
        <div id="registerView" style="display: none;">
            <h2>Ro'yxatdan o'tish</h2>
            <input type="text" id="rUser" placeholder="Yangi Login" class="input-group">
            <input type="password" id="rPass" placeholder="Yangi Parol" class="input-group" style="width:100%; margin-bottom:20px;">
            <button class="btn btn-primary" onclick="handleRegister()">SAQLASH</button>
            <p onclick="toggleAuth('login')" style="cursor:pointer; font-size:0.8rem; margin-top:10px;">Kirishga qaytish</p>
        </div>
    </div>

    <div id="mainDashboard" class="card main-card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
            <h2 style="margin:0;">Parolingizni xafsizroq qiling</h2>
            <button class="btn" style="width:auto; padding:8px 20px; background:var(--panel);" onclick="location.reload()">Chiqish</button>
        </div>

        <div class="method-tabs">
            <div class="tab active" id="tab-sim" onclick="switchMode('sim')">Simmetrik (AES)</div>
            <div class="tab" id="tab-hash" onclick="switchMode('hash')">Xeshflash (SHA-256)</div>
        </div>

        <div class="grid-layout">
            <div>
                <label>Matnni kiriting</label>
                <textarea id="mainInput" placeholder="Shifrlash yoki deshifrlash uchun matn..."></textarea>
                
                <div id="keySection" class="input-group" style="margin-top:15px;">
                    <label>Maxfiy Kalit</label>
                    <input type="text" id="mainKey" placeholder="Kalitni kiriting">
                </div>

                <button class="btn btn-primary" onclick="processCrypto('encrypt')">SHIFRLASH</button>
                <button id="decryptBtn" class="btn btn-decrypt" onclick="processCrypto('decrypt')">DESHIFRLASH</button>
            </div>

            <div>
                <label>Natija</label>
                <div id="output" class="result-screen">Kutilmoqda...</div>
                <button class="btn" style="background:var(--panel); margin-top:10px;" onclick="copyOut()">NUSXALASH</button>
            </div>

            <div>
                <label>Shifrlar Tarixi</label>
                <div id="historyList" class="history-panel">
                    <p style="font-size:0.7rem; color:var(--text-muted); text-align:center;">Tarix bo'sh</p>
                </div>
                <button class="btn" style="background:rgba(244,63,94,0.1); color:#f43f5e; margin-top:10px; font-size:0.7rem;" onclick="clearHistory()">TARIXNI TOZALASH</button>
            </div>
        </div>
    </div>

<script>
    let mode = 'sim';
    let currentUser = "";

    // AUTH
    function toggleAuth(v) {
        document.getElementById('loginView').style.display = v === 'login' ? 'block' : 'none';
        document.getElementById('registerView').style.display = v === 'reg' ? 'block' : 'none';
    }

    function handleRegister() {
        const u = document.getElementById('rUser').value.trim();
        const p = document.getElementById('rPass').value.trim();
        if(u.length < 3 || p.length < 5) return alert("Kam!");
        let users = JSON.parse(localStorage.getItem('users') || '{}');
        users[u] = p;
        localStorage.setItem('users', JSON.stringify(users));
        alert("Saqlandi!"); toggleAuth('login');
    }

    function handleLogin() {
        const u = document.getElementById('lUser').value;
        const p = document.getElementById('lPass').value;
        const users = JSON.parse(localStorage.getItem('users') || '{"admin":"123456"}');
        if(users[u] === p) {
            currentUser = u;
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            loadHistory();
        } else alert("Xato!");
    }

    // KRIPTO
    function switchMode(m) {
        mode = m;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-'+m).classList.add('active');
        document.getElementById('keySection').style.display = m === 'sim' ? 'block' : 'none';
        document.getElementById('decryptBtn').style.display = m === 'sim' ? 'block' : 'none';
    }

    function processCrypto(action) {
        const input = document.getElementById('mainInput').value.trim();
        const key = document.getElementById('mainKey').value.trim();
        let result = "";

        if(!input) return;

        try {
            if(mode === 'sim') {
                if(!key) return alert("Kalitni kiriting!");
                if(action === 'encrypt') {
                    result = CryptoJS.AES.encrypt(input, key).toString();
                    addToHistory("Shifrlash", result);
                } else {
                    const bytes = CryptoJS.AES.decrypt(input, key);
                    result = bytes.toString(CryptoJS.enc.Utf8);
                    if(!result) throw new Error();
                }
            } else {
                result = CryptoJS.SHA256(input).toString();
                addToHistory("Xesh (SHA)", result);
            }
            document.getElementById('output').textContent = result;
        } catch(e) {
            document.getElementById('output').textContent = "XATO: Noto'g'ri shifr yoki kalit!";
        }
    }

    // TARIX FUNKSIYALARI
    function addToHistory(type, val) {
        let history = JSON.parse(localStorage.getItem('crypto_history_' + currentUser) || '[]');
        history.unshift({ type, val, time: new Date().toLocaleTimeString() });
        if(history.length > 20) history.pop(); // Faqat oxirgi 20 tasi
        localStorage.setItem('crypto_history_' + currentUser, JSON.stringify(history));
        loadHistory();
    }

    function loadHistory() {
        const list = document.getElementById('historyList');
        let history = JSON.parse(localStorage.getItem('crypto_history_' + currentUser) || '[]');
        if(history.length === 0) {
            list.innerHTML = '<p style="font-size:0.7rem; color:var(--text-muted); text-align:center;">Tarix bo\'sh</p>';
            return;
        }
        list.innerHTML = history.map(item => `
            <div class="history-item">
                <small>${item.time} - ${item.type}</small>
                <span>${item.val}</span>
            </div>
        `).join('');
    }

    function clearHistory() {
        localStorage.removeItem('crypto_history_' + currentUser);
        loadHistory();
    }

    function copyOut() {
        navigator.clipboard.writeText(document.getElementById('output').textContent);
        alert("Nusxalandi!");
    }
</script>
</body>
</html>
